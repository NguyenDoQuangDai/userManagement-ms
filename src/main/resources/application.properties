spring.application.name=userManagement-ms
server.port=${PORT:8080}

# Database config with environment variables support
spring.datasource.url=${DATABASE_URL:jdbc:sqlserver://DAISKTOP:1433;databaseName=AngularDb;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:Dai0978526675}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Enable JPA logging
spring.jpa.show-sql=true

# Enable debug logging
logging.level.com.dai.userManagement_ms=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=DEBUG

# Spring Security: Environment-based credentials
spring.security.user.name=${ADMIN_USERNAME:admin}
spring.security.user.password=${ADMIN_PASSWORD:admin123}